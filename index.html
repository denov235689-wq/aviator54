<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Aviator · Premium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0c0a0e;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      color: #ede8f2;
    }

    .app-container {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      position: relative;
    }

    .glass-card {
      background: rgba(22, 18, 26, 0.6);
      backdrop-filter: blur(14px) saturate(180%);
      -webkit-backdrop-filter: blur(14px) saturate(180%);
      border: 1px solid rgba(255, 70, 70, 0.18);
      border-radius: 44px;
      padding: 32px 24px;
      box-shadow: 0 30px 50px -10px rgba(0,0,0,0.9), 0 0 0 1px rgba(255, 50, 50, 0.08) inset;
      transition: opacity 0.35s ease, transform 0.3s ease;
    }

    .hidden { display: none !important; }

    .logo {
      font-size: 26px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .logo i { color: #ff3b3b; text-shadow: 0 0 18px #ff2a2a80; }
    .logo span {
      background: linear-gradient(135deg, #f2edf7, #cdc4d6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .title {
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 28px;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #ffffff 20%, #c2b8cc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .field-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #b3a8bc;
      margin-bottom: 6px;
    }

    .input-id, .input-select {
      width: 100%;
      padding: 16px 18px;
      background: rgba(8, 6, 10, 0.7);
      border: 1px solid rgba(255, 60, 60, 0.25);
      border-radius: 24px;
      font-size: 17px;
      font-weight: 500;
      color: #f5eefa;
      outline: none;
      transition: all 0.25s;
      backdrop-filter: blur(4px);
      appearance: none;
      -webkit-appearance: none;
    }
    .input-select {
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="8" viewBox="0 0 14 8"><path fill="%23ff5a5a" d="M7 8L0 0h14z"/></svg>');
      background-repeat: no-repeat;
      background-position: right 18px center;
      background-size: 14px;
    }
    .input-id:focus, .input-select:focus {
      border-color: #ff3b3b;
      box-shadow: 0 0 0 3px #ff3b3b40, 0 0 30px #ff202010;
    }
    .input-select option { background: #1a1620; }

    .btn-primary {
      width: 100%;
      padding: 18px;
      background: #1dc071;
      border: none;
      border-radius: 60px;
      font-size: 20px;
      font-weight: 700;
      color: #0d0b0f;
      letter-spacing: 1px;
      box-shadow: 0 8px 28px #1dc07140, 0 0 0 1px #1dc07170 inset;
      transition: 0.25s;
      cursor: pointer;
      margin-top: 18px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }
    .btn-primary:hover { transform: scale(1.02); background: #2bda83; box-shadow: 0 12px 36px #1dc07170; }
    .btn-primary:active { transform: scale(0.96); }

    #screen2 { text-align: center; padding: 48px 20px; }
    .loading-icon {
      font-size: 48px;
      color: #ff3b3b;
      margin-bottom: 18px;
      display: inline-block;
      animation: pulseGlow 1.6s infinite;
    }
    @keyframes pulseGlow {
      0% { opacity: 0.5; text-shadow: 0 0 8px #ff3b3b; }
      50% { opacity: 1; text-shadow: 0 0 30px #ff3b3b, 0 0 60px #ff3b3b60; }
      100% { opacity: 0.5; text-shadow: 0 0 8px #ff3b3b; }
    }
    .loading-text {
      font-size: 26px;
      font-weight: 600;
      margin-bottom: 28px;
      letter-spacing: -0.3px;
      color: #e8e0ee;
    }
    .progress-track {
      background: #29242e;
      height: 8px;
      border-radius: 30px;
      overflow: hidden;
      margin: 16px 0 30px;
      box-shadow: inset 0 2px 6px #00000080;
    }
    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #ff3b3b, #ff7a7a, #ff3b3b);
      background-size: 200%;
      border-radius: 30px;
      transition: width 0.2s linear;
      animation: shimmer 1.3s infinite;
    }
    @keyframes shimmer {
      0% { background-position: 0% 0; }
      100% { background-position: 200% 0; }
    }
    .success-message {
      font-size: 24px;
      font-weight: 600;
      color: #1dc071;
      display: none;
      margin-top: 6px;
      animation: fadeUp 0.5s;
    }
    .success-message i { margin-right: 10px; }
    @keyframes fadeUp { 0% { opacity:0; transform:translateY(12px); } 100% { opacity:1; transform:translateY(0); } }

    .dash-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .dash-logo {
      font-size: 20px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .dash-logo i { color: #ff3b3b; text-shadow: 0 0 16px #ff3b3b; }
    .badge-id {
      background: rgba(255, 60, 60, 0.12);
      border: 1px solid #ff3b3b40;
      padding: 6px 16px;
      border-radius: 60px;
      font-size: 13px;
      font-weight: 500;
      backdrop-filter: blur(4px);
    }
    .admin-tag {
      font-size: 13px;
      background: #1f1a26;
      padding: 4px 14px;
      border-radius: 40px;
      border: 1px solid #ff3b3b30;
      color: #d4c8dd;
    }
    .admin-tag i { color: #ff6b6b; margin-right: 4px; }

    .multiplier-wrap {
      background: rgba(0,0,0,0.35);
      border-radius: 48px;
      padding: 24px 16px;
      margin-bottom: 24px;
      border: 1px solid #ff3b3b20;
      box-shadow: 0 0 40px #ff1a1a10;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .multiplier-value {
      font-size: 64px;
      font-weight: 700;
      letter-spacing: -2px;
      background: linear-gradient(135deg, #f7f0ff, #ffb0b0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      transition: 0.15s;
      text-shadow: 0 0 50px #ff4d4d30;
      line-height: 1.2;
    }
    .multiplier-label {
      font-size: 14px;
      color: #9c909f;
      letter-spacing: 2px;
      margin-top: 4px;
    }
    .round-status {
      position: absolute;
      top: 12px;
      right: 16px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 4px 12px;
      border-radius: 30px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      border: 1px solid #3f3645;
      color: #8a7e8f;
      transition: 0.3s;
    }
    .round-status.active {
      color: #1dc071;
      border-color: #1dc07160;
      box-shadow: 0 0 20px #1dc07120;
    }
    .round-status i { margin-right: 4px; }

    .history-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      background: rgba(0,0,0,0.25);
      border-radius: 60px;
      padding: 14px 16px;
      backdrop-filter: blur(4px);
      border: 1px solid #3f3645;
      margin-bottom: 24px;
      min-height: 50px;
    }
    .history-chip {
      background: #201c25;
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 600;
      color: #d4ccdb;
      border: 1px solid #3f3645;
      min-width: 48px;
      text-align: center;
      box-shadow: 0 2px 8px #00000040;
      transition: 0.2s;
    }
    .history-chip.high { border-color: #ff6b6b; color: #ff9e9e; }
    .history-chip.low { border-color: #4b7aff; color: #8bb0ff; }

    .btn-new-game {
      width: 100%;
      padding: 18px;
      background: rgba(255, 60, 60, 0.06);
      border: 1px solid #ff3b3b60;
      border-radius: 60px;
      font-weight: 700;
      font-size: 20px;
      color: #f5edfa;
      backdrop-filter: blur(4px);
      transition: 0.25s;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: 0 4px 20px #ff1a1a10;
      letter-spacing: 0.5px;
    }
    .btn-new-game i { color: #ff5a5a; font-size: 22px; }
    .btn-new-game:hover {
      background: #ff3b3b18;
      border-color: #ff6b6b;
      box-shadow: 0 0 32px #ff3b3b30, 0 0 70px #ff1a1a10;
      transform: translateY(-2px);
    }
    .btn-new-game:active { transform: scale(0.96); }

    #particleCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    @media (max-width: 480px) {
      .glass-card { padding: 22px 16px; }
      .title { font-size: 28px; }
      .multiplier-value { font-size: 48px; }
      .history-panel { gap: 5px; padding: 10px 12px; }
      .badge-id { font-size: 11px; padding: 4px 10px; }
      .round-status { font-size: 10px; padding: 3px 10px; top: 8px; right: 10px; }
    }
  </style>
</head>
<body>

  <canvas id="particleCanvas"></canvas>

  <div class="app-container">

    <!-- SCREEN 1 -->
    <div id="screen1" class="glass-card">
      <div class="logo">
        <i class="fas fa-rocket"></i>
        <span>Aviator</span>
      </div>
      <div class="title">Kirish</div>

      <div class="field-group">
        <label class="field-label"><i class="fas fa-caret-down"></i> Platforma</label>
        <select id="platformSelect" class="input-select">
          <option value="JSVSpin">JSVSpin</option>
          <option value="Bet">Bet</option>
          <option value="Demo Platform">Demo Platform</option>
        </select>
      </div>

      <div class="field-group">
        <label class="field-label"><i class="far fa-id-card"></i> ID</label>
        <input type="text" id="userIdInput" class="input-id" placeholder="ID ni kiriting..." value="" />
      </div>

      <button id="continueBtn" class="btn-primary">
        <i class="fas fa-arrow-right"></i> Davom etish
      </button>
    </div>

    <!-- SCREEN 2: Loading -->
    <div id="screen2" class="glass-card hidden">
      <div class="loading-icon"><i class="fas fa-spinner fa-pulse"></i></div>
      <div class="loading-text" id="loadingText">ID saqlanmoqda...</div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%;"></div>
      </div>
      <div class="success-message" id="successMessage"><i class="fas fa-check-circle"></i> ID muvaffaqiyatli saqlandi</div>
    </div>

    <!-- SCREEN 3: Dashboard -->
    <div id="screen3" class="glass-card hidden">
      <div class="dash-header">
        <div class="dash-logo"><i class="fas fa-plane"></i> Aviator</div>
        <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
          <span class="badge-id"><i class="far fa-id-card"></i> <span id="displayId">—</span></span>
          <span class="admin-tag"><i class="fas fa-user-cog"></i> @vrxszd</span>
        </div>
      </div>

      <div class="multiplier-wrap">
        <div class="multiplier-value" id="multiplierDisplay">—</div>
        <div class="multiplier-label">KO'EFFITSIENT</div>
        <div class="round-status" id="roundStatus"><i class="fas fa-circle"></i> jim</div>
      </div>

      <div class="history-panel" id="historyPanel"></div>

      <button id="newGameBtn" class="btn-new-game">
        <i class="fas fa-play"></i> New Game
      </button>
    </div>
  </div>

  <script>
    (function() {
      "use strict";

      // ---- DOM ----
      const screen1 = document.getElementById('screen1');
      const screen2 = document.getElementById('screen2');
      const screen3 = document.getElementById('screen3');
      const continueBtn = document.getElementById('continueBtn');
      const userIdInput = document.getElementById('userIdInput');
      const platformSelect = document.getElementById('platformSelect');
      const loadingText = document.getElementById('loadingText');
      const progressFill = document.getElementById('progressFill');
      const successMessage = document.getElementById('successMessage');
      const displayId = document.getElementById('displayId');
      const multiplierDisplay = document.getElementById('multiplierDisplay');
      const historyPanel = document.getElementById('historyPanel');
      const newGameBtn = document.getElementById('newGameBtn');
      const roundStatus = document.getElementById('roundStatus');

      // ---- state ----
      let currentId = 'GUEST';
      let historyValues = [];
      let scoreInterval = null;
      let isDashboardActive = false;
      let roundActive = false;
      let roundTimeout = null;
      let countdownInterval = null;

      // ---- helpers ----
      function randomFloat(min, max) {
        return +(Math.random() * (max - min) + min).toFixed(2);
      }

      function renderHistory() {
        historyPanel.innerHTML = '';
        const display = [...historyValues].reverse().slice(0, 10);
        display.forEach(val => {
          const chip = document.createElement('span');
          chip.className = 'history-chip';
          if (val >= 2.5) chip.classList.add('high');
          else if (val < 1.2) chip.classList.add('low');
          chip.textContent = val.toFixed(2) + 'x';
          historyPanel.appendChild(chip);
        });
      }

      function setRoundStatus(active) {
        if (active) {
          roundStatus.className = 'round-status active';
          roundStatus.innerHTML = '<i class="fas fa-circle"></i> o\'yin davom etmoqda';
        } else {
          roundStatus.className = 'round-status';
          roundStatus.innerHTML = '<i class="fas fa-circle"></i> jim';
        }
      }

      // ---- yangi round ----
      function startNewRound() {
        if (!isDashboardActive) return;
        
        // to'xtatish
        if (roundActive) {
          if (scoreInterval) {
            clearInterval(scoreInterval);
            scoreInterval = null;
          }
          if (roundTimeout) {
            clearTimeout(roundTimeout);
            roundTimeout = null;
          }
          if (countdownInterval) {
            clearInterval(countdownInterval);
            countdownInterval = null;
          }
          roundActive = false;
          setRoundStatus(false);
        }

        // avvalgi qiymatni history ga qo'sh
        const currentVal = parseFloat(multiplierDisplay.textContent.replace('x', ''));
        if (!isNaN(currentVal) && currentVal > 0 && multiplierDisplay.textContent !== '—') {
          historyValues.push(currentVal);
          if (historyValues.length > 20) historyValues.shift();
          renderHistory();
        }

        roundActive = true;
        setRoundStatus(true);
        
        // 10 sekundlik kutish (9 dan boshlab)
        let seconds = 9;
        multiplierDisplay.textContent = seconds + 's';
        multiplierDisplay.style.transform = 'scale(1)';

        countdownInterval = setInterval(() => {
          seconds--;
          if (seconds >= 0) {
            multiplierDisplay.textContent = seconds + 's';
          } else {
            clearInterval(countdownInterval);
            countdownInterval = null;
            // 10 sekund tugadi, koeffitsientni ko'rsatamiz
            showCoefficient();
          }
        }, 1000);

        function showCoefficient() {
          if (!isDashboardActive || !roundActive) return;
          
          // 1.00 dan 1.90 gacha boshlang'ich qiymat
          let currentScore = randomFloat(1.00, 1.90);
          multiplierDisplay.textContent = currentScore.toFixed(2) + 'x';

          // Har bir roundda yangi qiymat: asta-sekin o'sadi
          let steps = 0;
          const maxSteps = 15 + Math.floor(Math.random() * 15); // 15-30 step
          
          if (scoreInterval) clearInterval(scoreInterval);
          scoreInterval = setInterval(() => {
            steps++;
            const jump = (Math.random() * 0.10) + 0.02;
            currentScore += jump;
            if (currentScore > 9.90) currentScore = 9.90;
            multiplierDisplay.textContent = currentScore.toFixed(2) + 'x';

            multiplierDisplay.style.transform = 'scale(1.05)';
            setTimeout(() => { multiplierDisplay.style.transform = 'scale(1)'; }, 80);

            if (steps >= maxSteps || currentScore >= 9.80) {
              clearInterval(scoreInterval);
              scoreInterval = null;
              const finalVal = parseFloat(currentScore.toFixed(2));
              historyValues.push(finalVal);
              if (historyValues.length > 20) historyValues.shift();
              renderHistory();
              roundActive = false;
              setRoundStatus(false);
              roundTimeout = null;
            }
          }, 200);
        }
      }

      // ---- show dashboard ----
      function showDashboard(id, platform) {
        isDashboardActive = true;
        currentId = id || 'PLAYER';
        displayId.textContent = currentId;

        historyValues = Array.from({ length: 8 }, () => randomFloat(0.80, 6.50));
        renderHistory();

        screen1.classList.add('hidden');
        screen2.classList.add('hidden');
        screen3.classList.remove('hidden');

        multiplierDisplay.textContent = '—';
        setRoundStatus(false);
        roundActive = false;
        if (roundTimeout) {
          clearTimeout(roundTimeout);
          roundTimeout = null;
        }
        if (scoreInterval) {
          clearInterval(scoreInterval);
          scoreInterval = null;
        }
        if (countdownInterval) {
          clearInterval(countdownInterval);
          countdownInterval = null;
        }
      }

      // ---- loading screen 20s ----
      function showLoadingScreen(id, platform) {
        screen1.classList.add('hidden');
        screen2.classList.remove('hidden');
        screen3.classList.add('hidden');
        loadingText.textContent = 'ID saqlanmoqda...';
        successMessage.style.display = 'none';
        progressFill.style.width = '0%';

        let step = 0;
        const totalSteps = 40;
        const interval = setInterval(() => {
          step++;
          const progress = Math.min(100, (step / totalSteps) * 100);
          progressFill.style.width = progress + '%';

          if (step >= totalSteps) {
            clearInterval(interval);
            loadingText.textContent = 'Yakunlanmoqda...';
            setTimeout(() => {
              successMessage.style.display = 'block';
              loadingText.textContent = 'ID muvaffaqiyatli saqlandi';
              setTimeout(() => {
                showDashboard(id, platform);
              }, 600);
            }, 400);
          }
        }, 500);
      }

      // ---- continue ----
      function handleContinue() {
        const raw = userIdInput.value.trim();
        const id = raw || 'PLAYER';
        const platform = platformSelect.value;
        currentId = id;
        showLoadingScreen(id, platform);
      }

      // ---- reset ----
      function resetToWelcome() {
        isDashboardActive = false;
        roundActive = false;
        if (scoreInterval) {
          clearInterval(scoreInterval);
          scoreInterval = null;
        }
        if (roundTimeout) {
          clearTimeout(roundTimeout);
          roundTimeout = null;
        }
        if (countdownInterval) {
          clearInterval(countdownInterval);
          countdownInterval = null;
        }
        setRoundStatus(false);
        screen1.classList.remove('hidden');
        screen2.classList.add('hidden');
        screen3.classList.add('hidden');
        progressFill.style.width = '0%';
        successMessage.style.display = 'none';
        userIdInput.value = '';
      }

      // ---- event listeners ----
      continueBtn.addEventListener('click', handleContinue);
      userIdInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleContinue(); });

      newGameBtn.addEventListener('click', function() {
        if (isDashboardActive) {
          startNewRound();
        }
      });

      document.querySelector('.dash-logo')?.addEventListener('dblclick', resetToWelcome);

      // ---- particles ----
      const canvas = document.getElementById('particleCanvas');
      const ctx = canvas.getContext('2d');
      let particles = [];
      let w, h;

      function resizeCanvas() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      class Particle {
        constructor() { this.reset(); }
        reset() {
          this.x = Math.random() * w;
          this.y = Math.random() * h;
          this.size = Math.random() * 2.6 + 0.4;
          this.speedX = (Math.random() - 0.5) * 0.5;
          this.speedY = (Math.random() - 0.5) * 0.5;
          this.opacity = Math.random() * 0.5 + 0.1;
        }
        update() {
          this.x += this.speedX;
          this.y += this.speedY;
          if (this.x < 0 || this.x > w) this.speedX *= -1;
          if (this.y < 0 || this.y > h) this.speedY *= -1;
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 75, 75, ${this.opacity})`;
          ctx.shadowColor = '#ff3b3b';
          ctx.shadowBlur = 14;
          ctx.fill();
        }
      }

      for (let i = 0; i < 75; i++) particles.push(new Particle());

      function animateParticles() {
        ctx.clearRect(0, 0, w, h);
        particles.forEach(p => { p.update(); p.draw(); });
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.hypot(dx, dy);
            if (dist < 140) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = `rgba(255, 70, 70, ${0.05 * (1 - dist/140)})`;
              ctx.lineWidth = 0.6;
              ctx.stroke();
            }
          }
        }
        requestAnimationFrame(animateParticles);
      }
      animateParticles();

      // initial
      screen1.classList.remove('hidden');
      screen2.classList.add('hidden');
      screen3.classList.add('hidden');
      userIdInput.value = '';

    })();
  </script>
</body>
</html>
